<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedrock Coordinate Finder</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e24; color: #f5f5f5; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: #2a2a35; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        h1 { margin-top: 0; color: #4caf50; }
        input, select, button { margin: 10px 5px; padding: 12px; background: #3a3a4a; color: #fff; border: 1px solid #555; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        input:focus, select:focus { border-color: #4caf50; outline: none; }
        button { background: #4caf50; font-weight: bold; cursor: pointer; transition: background 0.2s; border: none; }
        button:hover { background: #45a049; }
        
        #grid { 
            display: grid; 
            grid-template-columns: repeat(16, 25px); 
            grid-template-rows: repeat(16, 25px);
            gap: 2px; 
            justify-content: center; 
            margin: 25px auto; 
            padding: 10px; 
            background: #111; 
            border-radius: 8px; 
            width: fit-content; 
            height: 430px; /* Forces it open even if empty */
        }
        .cell { 
            width: 25px; 
            height: 25px; 
            background: #555; 
            border-radius: 2px; 
            cursor: pointer; 
            transition: background 0.1s;
            box-sizing: border-box;
        }
        .cell.bedrock { background: #000; box-shadow: inset 0 0 4px #fff; }
        
        #result { margin-top: 25px; padding: 15px; border-radius: 6px; font-weight: bold; display: none; }
        .success { background: #2e7d32; color: #fff; }
        .searching { background: #1565c0; color: #fff; }
        .error { background: #c62828; color: #fff; }
        .controls { display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 10px; }
        .hidden-canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bedrock Coordinate Finder</h1>
        <p>Upload a top-down screenshot or click squares manually to draw the 16x16 pattern.</p>
        
        <div class="controls">
            <input type="text" id="seed" placeholder="Enter World Seed" required>
            <select id="dimension">
                <option value="overworld_floor">Overworld Floor (Y: -64 to -60)</option>
                <option value="nether_floor">Nether Floor (Y: 0 to 4)</option>
                <option value="nether_roof">Nether Roof (Y: 123 to 127)</option>
            </select>
        </div>

        <div class="controls">
            <label style="cursor:pointer; padding:12px; background:#3a3a4a; border-radius:6px; border:1px solid #555;">
                📸 Upload Screenshot
                <input type="file" id="imageInput" accept="image/*" style="display:none;">
            </label>
        </div>
        
        <div id="grid"></div>
        <canvas id="processCanvas" class="hidden-canvas"></canvas>
        
        <div class="controls">
            <button id="rotateBtn">🔄 Rotate Pattern</button>
            <button id="clearBtn">🗑️ Clear Grid</button>
            <button id="searchBtn">🚀 Find Coordinates</button>
        </div>
        
        <div id="result"></div>
    </div>

    <script>
        // Everything inside here runs automatically on your page
        const gridContainer = document.getElementById('grid');
        const searchBtn = document.getElementById('searchBtn');
        const rotateBtn = document.getElementById('rotateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const resultDiv = document.getElementById('result');
        const imageInput = document.getElementById('imageInput');
        const canvas = document.getElementById('processCanvas');
        const ctx = canvas.getContext('2d');

        const gridSize = 16;
        let bedrockMatrix = Array(gridSize).fill().map(() => Array(gridSize).fill(0));

        function createGrid() {
            gridContainer.innerHTML = '';
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    if (bedrockMatrix[r][c] === 1) cell.classList.add('bedrock');
                    
                    cell.addEventListener('click', () => {
                        bedrockMatrix[r][c] = bedrockMatrix[r][c] === 0 ? 1 : 0;
                        cell.classList.toggle('bedrock');
                    });
                    gridContainer.appendChild(cell);
                }
            }
        }

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const img = new Image();
            img.onload = () => {
                canvas.width = gridSize;
                canvas.height = gridSize;
                ctx.drawImage(img, 0, 0, gridSize, gridSize);
                
                const imgData = ctx.getImageData(0, 0, gridSize, gridSize).data;
                
                for (let r = 0; r < gridSize; r++) {
                    for (let c = 0; c < gridSize; c++) {
                        const idx = (r * gridSize + c) * 4;
                        const rVal = imgData[idx];
                        const gVal = imgData[idx + 1];
                        const bVal = imgData[idx + 2];
                        const brightness = (rVal + gVal + bVal) / 3;
                        bedrockMatrix[r][c] = brightness < 75 ? 1 : 0;
                    }
                }
                createGrid();
            };
            img.src = URL.createObjectURL(file);
        });

        class MinecraftRandom {
            constructor(seed) {
                this.seed = BigInt(seed);
                this.multiplier = 0x5DEECE66DNn;
                this.addend = 0xBLn;
                this.mask = (1N << 48N) - 1N;
                this.seed = (this.seed ^ this.multiplier) & this.mask;
            }

            nextBits(bits) {
                this.seed = (this.seed * this.multiplier + this.addend) & this.mask;
                return Number(this.seed >> (48N - BigInt(bits)));
            }

            nextInt(bound) {
                if ((bound & -bound) === bound) {
                    return Number((BigInt(bound) * BigInt(this.nextBits(31))) >> 31N);
                }
                let bits, val;
                do {
                    bits = this.nextBits(31);
                    val = bits % bound;
                } while (bits - val + (bound - 1) < 0);
                return val;
            }
        }

        function isBedrockAt(worldSeed, x, z, dimension) {
            let blockSeed = BigInt(x) * 341873128712N + BigInt(z) * 132897987541N + BigInt(worldSeed);
            let rand = new MinecraftRandom(blockSeed);
            let randValue = rand.nextInt(5);
            return randValue === 0 ? 1 : 0;
        }

        function searchForPattern(worldSeed, targetMatrix, dimension) {
            const searchLimit = 4000; 
            
            for (let x = -searchLimit; x < searchLimit; x += 16) {
                for (let z = -searchLimit; z < searchLimit; z += 16) {
                    let match = true;
                    
                    for (let r = 0; r < 16; r++) {
                        for (let c = 0; c < 16; c++) {
                            let generated = isBedrockAt(worldSeed, x + r, z + c, dimension);
                            if (generated !== targetMatrix[r][c]) {
                                match = false;
                                break;
                            }
                        }
                        if (!match) break;
                    }
                    if (match) return { x, z };
                }
            }
            return null;
        }

        rotateBtn.addEventListener('click', () => {
            bedrockMatrix = bedrockMatrix.map((val, index) => bedrockMatrix.map(row => row[index]).reverse());
            createGrid();
        });

        clearBtn.addEventListener('click', () => {
            bedrockMatrix = Array(gridSize).fill().map(() => Array(gridSize).fill(0));
            createGrid();
            resultDiv.style.display = 'none';
            imageInput.value = "";
        });

        searchBtn.addEventListener('click', () => {
            const seedInput = document.getElementById('seed').value;
            const dimension = document.getElementById('dimension').value;
            
            if (!seedInput) {
                alert("Please enter your world seed!");
                return;
            }
            
            resultDiv.className = 'searching';
            resultDiv.style.display = 'block';
            resultDiv.innerText = "Scanning coordinate maps... (This may take a moment)";
            
            setTimeout(() => {
                const result = searchForPattern(seedInput, bedrockMatrix, dimension);
                if (result) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `📍 Match Found!<br>Chunk Coordinates: X: <strong>${result.x}</strong>, Z: <strong>${result.z}</strong>`;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerText = "No matching coordinates found within 4000 blocks. Try rotating the grid or cleaning up misread blocks.";
                }
            }, 50);
        });

        // Fire up the grid instantly on load
        createGrid();
    </script>
</body>
</html>
